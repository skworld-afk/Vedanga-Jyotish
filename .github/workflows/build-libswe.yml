name: Build Swiss Ephemeris for Amazon Linux 2023

on:
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the compiled file back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build libswe.so in Amazon Linux 2023 container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/cpp/swisseph \
            amazonlinux:2023 \
            bash -c "yum groupinstall -y 'Development Tools' && make libswe.so && mkdir -p /workspace/apps/web/bin && cp libswe.so /workspace/apps/web/bin/"

      - name: Commit and push the compiled binary
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/bin/libswe.so
          git commit -m "chore: build libswe.so for Amazon Linux 2023" || echo "No changes to commit"
          git push
